services:
  backend:
    build: ./backend
    env_file: .env
    volumes:
      - ./backend/data:/app/data
    ports:
      - "8000:8000"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        # Empty string makes the frontend use relative /api/ URLs,
        # which nginx proxies to the backend service.
        VITE_API_BASE_URL: ""
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped
